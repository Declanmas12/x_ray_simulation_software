<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <!-- Definition for Gradients & Filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#161b26" />
    </linearGradient>

    <!-- Glowing Laser Gradient -->
    <linearGradient id="laserGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="1" />
      <stop offset="30%" stop-color="#00f3ff" stop-opacity="0.9" />
      <stop offset="65%" stop-color="#ff0055" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ff0055" stop-opacity="0.1" />
    </linearGradient>

    <!-- Layer 1 Gradient (Quartz/Glass) -->
    <linearGradient id="layer1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.05" />
    </linearGradient>

    <!-- Layer 2 Gradient (ITO/Thin Film) -->
    <linearGradient id="layer2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2af598" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#009efd" stop-opacity="0.1" />
    </linearGradient>

    <!-- Layer 3 Gradient (Perovskite/Absorber) -->
    <linearGradient id="layer3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ca8a04" stop-opacity="0.1" />
    </linearGradient>

    <!-- Text Typography Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="800" height="300" rx="12" fill="url(#bgGrad)" stroke="#232d3f" stroke-width="2"/>

  <!-- Technical Grid Pattern Substrate -->
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 500,0 L 500,300 M 600,0 L 600,300 M 700,0 L 700,300" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- ================= LOGO ICON GRAPHIC ================= -->
  <!-- Layer 1: Left Stack Element -->
  <polygon points="120,70 155,55 155,215 120,230" fill="url(#layer1)" stroke="#00f3ff" stroke-width="1.5" stroke-dasharray="4 2" />
  
  <!-- Layer 2: Middle Thin Film Component -->
  <polygon points="160,52 180,44 180,204 160,212" fill="url(#layer2)" stroke="#2af598" stroke-width="2" />
  
  <!-- Layer 3: Right Heavy Absorber Element -->
  <polygon points="185,42 240,20 240,180 185,202" fill="url(#layer3)" stroke="#ff0055" stroke-width="1.5" />

  <!-- Attenuating Photon Stream (X-Ray Beam Line) -->
  <!-- Incoming High-Energy Beam -->
  <path d="M 40,140 L 140,140" stroke="#00f3ff" stroke-width="5" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 40,140 L 140,140" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- In-Stack Interaction Scatter Wavelet -->
  <path d="M 140,140 Q 160,110 175,138 T 210,135" fill="none" stroke="#2af598" stroke-width="3" opacity="0.8" />
  
  <!-- Attenuated Outgoing Diminished Beam -->
  <path d="M 210,135 L 290,135" stroke="#ff0055" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round" opacity="0.6" />
  <polygon points="290,135 282,131 282,139" fill="#ff0055" opacity="0.6" />

  <!-- Interaction Collision Accent Points -->
  <circle cx="140" cy="140" r="4" fill="#ffffff" filter="url(#glow)"/>
  <circle cx="175" cy="138" r="3" fill="#2af598" />

  <!-- ================= TYPOGRAPHY HEADER ================= -->
  <!-- Main Brand Name Text -->
  <text x="340" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="800" font-size="64" fill="#ffffff" letter-spacing="2">
    Attenu<tspan fill="#00f3ff">X</tspan>
  </text>

  <!-- Subtitle App Purpose Tag -->
  <text x="345" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif" font-weight="500" font-size="14" fill="#6b7280" letter-spacing="4.5">
    MULTILAYER X-RAY SIMULATOR
  </text>

  <!-- Structural Border Accents (UI Vibe) -->
  <path d="M 760,20 L 780,20 L 780,40" fill="none" stroke="#4b5563" stroke-width="2" />
  <path d="M 40,280 L 20,280 L 20,260" fill="none" stroke="#4b5563" stroke-width="2" />
</svg>
